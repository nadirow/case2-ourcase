<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OurCase</title>


<style>


*{
box-sizing:border-box;
font-family:Tahoma,Arial,sans-serif;
}


body{

margin:0;
min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:#f5f7fb;

padding:20px;

}



.container{

width:100%;
max-width:430px;

background:white;

padding:35px 25px;

border-radius:22px;

border-top:5px solid #d40000;

box-shadow:0 10px 35px rgba(0,0,0,.12);

text-align:center;

}



.logo-img{

width:180px;

max-width:85%;

margin-bottom:15px;

}



.subtitle{

color:#777;

font-size:17px;

margin-bottom:25px;

}





.pin-boxes{


display:flex;

justify-content:center;

gap:12px;

direction:ltr;


}



.pin-box{


width:60px;

height:60px;


border-radius:14px;


border:2px solid #ddd;


font-size:30px;


text-align:center;


outline:none;


background:#fafafa;


}





.pin-box:focus{


border-color:#d40000;

box-shadow:0 0 12px #ffcaca;


}



button{


width:100%;

margin-top:20px;

padding:15px;


background:#d40000;


color:white;


border:none;


border-radius:12px;


font-size:17px;


cursor:pointer;


}



button:hover{


background:#a80000;


}





#error{


color:#d40000;

margin-top:15px;

}





.case-image{


width:100%;


border-radius:15px;


border:1px solid #eee;


}





</style>

</head>



<body>



<div class="container">



<img src="logo white1 (2).png" class="logo-img">



<div class="subtitle">

ملفات التحقيق السرية

</div>





<div id="login">



<div class="pin-boxes">


<input class="pin-box" maxlength="1" inputmode="numeric">

<input class="pin-box" maxlength="1" inputmode="numeric">

<input class="pin-box" maxlength="1" inputmode="numeric">

<input class="pin-box" maxlength="1" inputmode="numeric">


</div>



<button onclick="check()">

فتح الملف 🔍

</button>


<p id="error"></p>



</div>





<div id="content" style="display:none">


<img src="case.jpg" class="case-image">


</div>




</div>





<script>


let boxes = document.querySelectorAll(".pin-box");



boxes.forEach((box,index)=>{


box.addEventListener("input",()=>{


if(box.value && index < boxes.length-1){

boxes[index+1].focus();

}


if(index===3){

check();

}


});



box.addEventListener("keydown",(e)=>{


if(e.key==="Backspace" && !box.value && index>0){

boxes[index-1].focus();

}


});


});






function check(){


let pin="";


boxes.forEach(b=>{

pin += b.value;

});



if(pin==="8519"){


document.getElementById("login").style.display="none";


document.querySelector(".subtitle").style.display="none";


document.getElementById("content").style.display="block";


}

else if(pin.length===4){


document.getElementById("error").innerHTML=

"PIN خاطئ ❌";


boxes.forEach(b=>b.value="");


boxes[0].focus();


}



}



boxes[0].focus();



</script>



</body>


</html>
