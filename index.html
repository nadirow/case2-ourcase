<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Game</title>

<style>
*{
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    margin:0;
    height:100vh;
    background:
    radial-gradient(circle at top,#333,#080808);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.container{
    width:420px;
    padding:35px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border-radius:25px;
    box-shadow:0 0 40px #000;
    text-align:center;
    animation:appear .8s;
}

h1{
    font-size:40px;
    margin-bottom:5px;
}

.subtitle{
    color:#aaa;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:15px;
    border-radius:12px;
    border:none;
    outline:none;
    font-size:18px;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#ffcc00;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    transform:scale(1.05);
}

.card{
    margin-top:20px;
    padding:20px;
    background:rgba(255,255,255,.1);
    border-radius:15px;
}

a{
    display:block;
    margin:12px;
    padding:12px;
    border-radius:10px;
    background:#222;
    color:white;
    text-decoration:none;
    transition:.2s;
}

a:hover{
    background:#ffcc00;
    color:black;
}

#error{
    color:#ff5555;
    margin-top:10px;
}

@keyframes appear{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

</head>

<body>

<div class="container">

<h1>🎲 MY GAME</h1>
<p class="subtitle">Enter the secret code to unlock</p>


<div id="login">

<input id="pass" type="password" placeholder="Password">

<button onclick="check()">
Unlock 🔓
</button>

<p id="error"></p>

</div>


<div id="content" style="display:none">

<div class="card">

<h2>Welcome Player 🏆</h2>

<a href="rules.pdf">📖 Game Rules</a>

<a href="cards.pdf">🃏 Cards File</a>

<a href="board.pdf">🎯 Board</a>

</div>

</div>


</div>


<script>

function check(){

let password =
document.getElementById("pass").value;


if(password=="1234"){

document.getElementById("login").style.display="none";

document.getElementById("content").style.display="block";

}

else{

document.getElementById("error").innerHTML=
"Wrong password ❌";

}

}

</script>


</body>
</html>
