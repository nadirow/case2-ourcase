<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>OurCase</title>


<style>

*{
box-sizing:border-box;
font-family:"Tahoma", Arial, sans-serif;
}


body{

margin:0;
height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:
radial-gradient(circle,#5b0000,#050505 70%);

color:white;

}



.container{

width:430px;

padding:40px;

background:rgba(0,0,0,.85);

border:1px solid #8b0000;

border-radius:20px;

box-shadow:
0 0 30px #900000,
inset 0 0 20px #000;

text-align:center;

animation:show .8s;

}




.logo{

font-size:48px;

font-weight:bold;

letter-spacing:4px;

color:#d40000;

text-shadow:
0 0 20px red;

}




.subtitle{

color:#aaa;

font-size:17px;

margin-bottom:30px;

}




input{

width:100%;

padding:15px;

background:#111;

border:1px solid #700;

color:white;

border-radius:10px;

font-size:18px;

text-align:center;

outline:none;

}





button{

margin-top:15px;

width:100%;

padding:15px;

background:#9b0000;

color:white;

border:none;

border-radius:10px;

font-size:18px;

cursor:pointer;

transition:.2s;

}




button:hover{

background:#d00000;

transform:scale(1.05);

}




#error{

color:#ff3333;

margin-top:15px;

}





.case-image{


width:100%;

border-radius:15px;

border:1px solid #900000;


box-shadow:
0 0 25px #900000;


animation:show .5s;


}




@keyframes show{


from{

opacity:0;

transform:translateY(40px);

}


to{

opacity:1;

transform:translateY(0);

}


}



</style>


</head>



<body>



<div class="container">



<div class="logo">

OurCase

</div>



<p class="subtitle">

ملفات التحقيق السرية

</p>





<div id="login">



<input

id="pass"

type="password"

placeholder="أدخل رمز القضية">





<button onclick="check()">

فتح القضية 🔍

</button>



<p id="error"></p>



</div>






<div id="content" style="display:none">



<img src="case.jpg" class="case-image">



</div>





</div>







<script>


function check(){


let password =

document.getElementById("pass").value;




if(password=="1234"){



document.getElementById("login").style.display="none";

document.querySelector(".subtitle").style.display="none";

document.getElementById("content").style.display="block";



}

else{


document.getElementById("error").innerHTML =

"رمز خاطئ ❌";


}



}



</script>




</body>

</html>
