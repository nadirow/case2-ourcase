<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OurCase</title>


<style>

*{
box-sizing:border-box;
font-family:"Tahoma",Arial,sans-serif;
}


body{

margin:0;
min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

background:
radial-gradient(circle,#5b0000,#050505 70%);

color:white;

}





.container{

width:100%;
max-width:450px;

padding:35px 25px;

background:rgba(0,0,0,.85);

border:1px solid #8b0000;

border-radius:22px;

box-shadow:
0 0 30px #900000,
inset 0 0 20px #000;

text-align:center;

animation:show .7s;

}





.logo{

font-size:clamp(35px,10vw,55px);

font-weight:bold;

letter-spacing:3px;

color:#d40000;

text-shadow:0 0 20px red;

}




.subtitle{

color:#aaa;

font-size:clamp(14px,4vw,18px);

margin-bottom:25px;

}





input{


width:100%;

padding:15px;

background:#111;

border:1px solid #700;

color:white;

border-radius:12px;

font-size:16px;

text-align:center;

outline:none;


}





button{


margin-top:15px;

width:100%;

padding:15px;

background:#9b0000;

color:white;

border:none;

border-radius:12px;

font-size:17px;

cursor:pointer;

transition:.2s;


}





button:hover{

background:#d00000;

transform:scale(1.03);

}





#error{

color:#ff3333;

margin-top:15px;

}





.case-image{


width:100%;

max-height:70vh;

object-fit:contain;

border-radius:15px;

border:1px solid #900000;


box-shadow:
0 0 25px #900000;


}





@keyframes show{


from{

opacity:0;

transform:translateY(30px);

}


to{

opacity:1;

transform:translateY(0);

}


}





/* الهاتف */

@media(max-width:500px){


.container{

padding:25px 18px;

border-radius:18px;

}


input,button{

font-size:16px;

padding:14px;

}


}







/* الشاشات الكبيرة */


@media(min-width:900px){


.container{

max-width:500px;

padding:45px;

}


}


</style>


</head>




<body>




<div class="container">





<div class="logo">

OurCase

</div>




<p class="subtitle">

ملفات التحقيق السرية

</p>






<div id="login">





<input

id="pass"

type="password"

placeholder="أدخل رمز القضية">





<button onclick="check()">

فتح القضية 🔍

</button>





<p id="error"></p>





</div>







<div id="content" style="display:none">



<img src="case.jpg" class="case-image">



</div>







</div>








<script>


function check(){


let password =
document.getElementById("pass").value;



if(password=="1234"){


document.getElementById("login").style.display="none";


document.querySelector(".subtitle").style.display="none";


document.getElementById("content").style.display="block";


}

else{


document.getElementById("error").innerHTML =
"رمز خاطئ ❌";


}



}



</script>






</body>


</html>
